name: VetForum Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build
      env:
        VITE_API_URL: https://api.vetforumindia.com # Update with production API URL

    - name: Deploy to VPS (SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOSTINGER_VPS_IP }}
        username: ${{ secrets.HOSTINGER_VPS_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: 22
        source: "dist/*"
        target: "${{ secrets.FRONTEND_DEPLOY_PATH }}"
        strip_components: 1

    - name: Reload Nginx (Optional)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOSTINGER_VPS_IP }}
        username: ${{ secrets.HOSTINGER_VPS_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: 22
        script: |
          sudo nginx -t && sudo systemctl reload nginx
