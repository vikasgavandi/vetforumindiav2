services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: vetforumindia
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./vetforum-backend 
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # These variables can still be overridden individually if needed
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-vetforumindia}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - PORT=${PORT:-4000}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - db
    command: sh -c "[ -d node_modules ] || npm install && npm start"

  frontend:
    build: ./vetforum-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    command: sh -c "[ -d node_modules ] || npm install && npm run build && npm run preview"

volumes:
  db_data:
