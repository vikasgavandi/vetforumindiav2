services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: vetforumindia
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./vetforum-backend
    image: vetforumindia-backend:latest
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-vetforumindia}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      - PORT=${PORT:-4000}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - db
    command: npm start

  frontend:
    build: ./vetforum-frontend
    image: vetforumindia-frontend:latest
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    command: npm run preview

volumes:
  db_data:
