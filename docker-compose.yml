services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: vetforumindia
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  backend:
    build: ./vetforum-backend 
    restart: always
    ports:
      - "4000:4000"
    environment:
      # Database access
      - DB_HOST=db
      - DB_NAME=vetforumindia
      - DB_USER=root
      - DB_PASSWORD=
      - PORT=4000
      - NODE_ENV=production
      # Security & Auth
      - JWT_SECRET=c114996c-8531-4471-b185-ff1512238097
      - JWT_EXPIRES_IN=7d
      # Payment Gateway (Razorpay)
      - PAYMENT_BYPASS_MODE=true
      - RAZORPAY_KEY_ID=rzp_test_SJW4ahugahNqIr
      - RAZORPAY_KEY_SECRET=AcEDb0oNq9HT79OPb2QRvuVZ
      # Zoom Meeting Integration
      - ZOOM_ACCOUNT_ID=EvBiZ5xUTTON7TnVrNDn7g
      - ZOOM_CLIENT_ID=dzUPqnZEQWyzFaDq2kSzhQ
      - ZOOM_CLIENT_SECRET=NlKiPOh3qvnlq5G815cFGVwqNvI1Y9RI
      # Email SMTP Configuration
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=465
      - EMAIL_SECURE=true
      - EMAIL_USER=admin@vetforumindia.com
      - EMAIL_PASS=xatr pekk jyyl ekbe
    depends_on:
      - db
    command: sh -c "[ -d node_modules ] || npm install && npm start"

  frontend:
    build: ./vetforum-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    command: sh -c "[ -d node_modules ] || npm install && npm run build && npm run preview"

volumes:
  db_data:
