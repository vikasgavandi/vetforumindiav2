# Nginx Configuration for VetForumIndia (Native/Bare Metal)
# Save this to /etc/nginx/sites-available/vetforum
# Then symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 82.29.162.240; # Replace with your domain if available

    # Frontend Static Files
    location / {
        root /root/vetforumindiav2/vetforum-frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads Static Files
    location /uploads/ {
        alias /root/vetforumindiav2/vetforum-backend/uploads/;
        autoindex off;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
